version: 2
updates:
  # Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/" # Adjust if your requirements.txt or pyproject.toml is elsewhere
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"
      - "security"
    assignees:
      - "AlExAnDeR-O-G"
    reviewers:
      - "AlExAnDeR-O-G"
    commit-message:
      prefix: "deps"
      include: "scope"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      - dependency-name: "some-package-you-want-to-ignore"
        versions: ["1.x.x"] # Remove or modify as needed
    automerge: true
    security-updates: true

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "actions"
      - "automerge"
    assignees:
      - "AlExAnDeR-O-G"
    automerge: true

  # (Optional) Add more ecosystems as needed, e.g. Docker, npm, etc.

# Enable Dependabot to update its own config file as well
  - package-ecosystem: "github-actions"
    directory: "/.github/"
    schedule:
      interval: "weekly"
    labels:
      - "meta"
      - "automerge"
    automerge: true

# You can further automate by configuring branch protection rules and required status checks in your repo settings.
